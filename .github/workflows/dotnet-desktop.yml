name: .NET Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    strategy:
      matrix:
        configuration: [Debug, Release]
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    env:
      Solution_Name: PRA.sln

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore ${{ env.Solution_Name }}

    - name: Build
      run: dotnet build ${{ env.Solution_Name }} --configuration ${{ matrix.configuration }} --no-restore

    # No test project exists yet — remove this comment and add the step below
    # once one does (e.g. PRA.Core.Tests).
    # - name: Run tests
    #   run: dotnet test PRA.Core.Tests/PRA.Core.Tests.csproj --configuration ${{ matrix.configuration }} --no-build
